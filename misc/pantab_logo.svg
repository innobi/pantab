<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <!-- Icon: 3x3 data grid representing tabular data -->
  <g transform="translate(16, 12)">
    <!-- Row 1 -->
    <rect x="0"  y="0"  width="28" height="28" rx="5" fill="#002255"/>
    <rect x="34" y="0"  width="28" height="28" rx="5" fill="#e86321"/>
    <rect x="68" y="0"  width="28" height="28" rx="5" fill="#002255" opacity="0.4"/>
    <!-- Row 2 -->
    <rect x="0"  y="34" width="28" height="28" rx="5" fill="#e86321" opacity="0.4"/>
    <rect x="34" y="34" width="28" height="28" rx="5" fill="#002255"/>
    <rect x="68" y="34" width="28" height="28" rx="5" fill="#e86321"/>
    <!-- Row 3 -->
    <rect x="0"  y="68" width="28" height="28" rx="5" fill="#002255"/>
    <rect x="34" y="68" width="28" height="28" rx="5" fill="#e86321" opacity="0.4"/>
    <rect x="68" y="68" width="28" height="28" rx="5" fill="#002255"/>
  </g>

  <!-- Wordmark -->
  <text x="136" y="82" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="-1">
    <tspan fill="#002255">pan</tspan><tspan fill="#e86321">tab</tspan>
  </text>
</svg>
